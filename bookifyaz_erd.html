
<style>
#erd { overflow-x: auto; }
#erd svg { min-width: 900px; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  TENANT {
    uuid id PK
    string name
    string slug
    string logo_url
    string timezone
    boolean is_active
    timestamp created_at
  }
  USER {
    uuid id PK
    string full_name
    string email
    string phone
    string password_hash
    string role
    timestamp created_at
  }
  TENANT_USER {
    uuid id PK
    uuid tenant_id FK
    uuid user_id FK
    string role
  }
  STAFF {
    uuid id PK
    uuid tenant_id FK
    uuid user_id FK
    string bio
    string photo_url
    boolean is_active
  }
  SERVICE {
    uuid id PK
    uuid tenant_id FK
    string name
    int duration_min
    decimal price
    string color
    boolean is_active
  }
  STAFF_SERVICE {
    uuid staff_id FK
    uuid service_id FK
  }
  WORKING_HOURS {
    uuid id PK
    uuid staff_id FK
    int day_of_week
    time start_time
    time end_time
    boolean is_off
  }
  TIME_OFF {
    uuid id PK
    uuid staff_id FK
    date start_date
    date end_date
    string reason
  }
  BOOKING {
    uuid id PK
    uuid tenant_id FK
    uuid client_id FK
    uuid staff_id FK
    uuid service_id FK
    timestamp starts_at
    timestamp ends_at
    string status
    string notes
    timestamp created_at
  }
  BOOKING_STATUS_HISTORY {
    uuid id PK
    uuid booking_id FK
    string from_status
    string to_status
    uuid changed_by FK
    timestamp changed_at
  }
  NOTIFICATION {
    uuid id PK
    uuid booking_id FK
    string channel
    string recipient
    string type
    boolean is_sent
    timestamp sent_at
  }
  SUBSCRIPTION_PLAN {
    uuid id PK
    string name
    decimal price_monthly
    int booking_limit
    boolean sms_enabled
    boolean multi_branch
  }
  TENANT_SUBSCRIPTION {
    uuid id PK
    uuid tenant_id FK
    uuid plan_id FK
    date starts_at
    date ends_at
    string status
  }
  PAYMENT {
    uuid id PK
    uuid tenant_id FK
    uuid subscription_id FK
    decimal amount
    string currency
    string provider_tx_id
    string status
    timestamp paid_at
  }
  REVIEW {
    uuid id PK
    uuid tenant_id FK
    uuid client_id FK
    uuid staff_id FK
    uuid booking_id FK
    int rating
    string comment
    timestamp created_at
  }

  TENANT ||--o{ TENANT_USER : has
  USER ||--o{ TENANT_USER : belongs
  TENANT ||--o{ STAFF : employs
  USER ||--o| STAFF : is
  TENANT ||--o{ SERVICE : offers
  STAFF ||--o{ STAFF_SERVICE : provides
  SERVICE ||--o{ STAFF_SERVICE : done_by
  STAFF ||--o{ WORKING_HOURS : has
  STAFF ||--o{ TIME_OFF : takes
  TENANT ||--o{ BOOKING : receives
  USER ||--o{ BOOKING : makes
  STAFF ||--o{ BOOKING : handles
  SERVICE ||--o{ BOOKING : used_in
  BOOKING ||--o{ BOOKING_STATUS_HISTORY : tracks
  BOOKING ||--o{ NOTIFICATION : triggers
  BOOKING ||--o| REVIEW : gets
  TENANT ||--o{ TENANT_SUBSCRIPTION : subscribes
  SUBSCRIPTION_PLAN ||--o{ TENANT_SUBSCRIPTION : defines
  TENANT_SUBSCRIPTION ||--o{ PAYMENT : billed_by
`;
const { svg } = await mermaid.render('erd-main', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>

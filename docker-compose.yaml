services:
  postgres:
    image: postgres:17
    container_name: bookifyaz-postgres
    environment:
      POSTGRES_USER: bookifyaz
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookifyaz_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookifyaz -d bookifyaz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bookifyaz-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bookifyaz.az
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local